<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mafer XV</title>
  <meta name="theme-color" content="#03020a" />
  <meta property="og:title" content="Mafer XV" />
  <meta property="og:description" content="Toque para abrir o convite." />
  <meta property="og:image" content="assets/principal.png" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03020a;color:#fff;font-family:Arial,Helvetica,sans-serif}.app{position:fixed;inset:0;background:#03020a;display:grid;place-items:center}.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#03020a}.screen.active{display:flex}.start{z-index:20;display:flex;flex-direction:column;gap:18px;text-align:center;padding:28px;background:radial-gradient(circle at 50% 30%,rgba(51,35,79,.9),#03020a 70%)}.start h1{font-size:clamp(42px,13vw,90px);margin:0;line-height:.95}.start p{margin:0;color:#d7d1df;font-size:18px}.start button,.gold-btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fff0a9,#d49c2d 55%,#8e5d12);color:#120a02;font-weight:900;font-size:18px;padding:17px 28px;box-shadow:0 18px 50px rgba(245,190,70,.28);cursor:pointer}.brand{letter-spacing:7px;color:#f3c969;font-size:12px;font-weight:700}.video{width:100%;height:100%;object-fit:cover;background:#000}.fade{position:absolute;inset:0;background:#03020a;opacity:0;pointer-events:none;transition:opacity .8s ease;z-index:10}.fade.on{opacity:1}.imageStage{position:relative;height:100dvh;width:100vw;display:flex;align-items:center;justify-content:center;background:#03020a}.art{height:100dvh;width:auto;max-width:100vw;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}.hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer}.debug .hotspot{background:rgba(255,0,0,.28)!important;border:2px solid rgba(255,255,255,.85)}.hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(8px);border-radius:999px;padding:8px 13px;color:#ddd;font-size:12px;opacity:.85}.panel{position:absolute;inset:0;background:#03020a;display:none;align-items:center;justify-content:center;z-index:5}.panel.active{display:flex}.close{position:absolute;top:max(16px,env(safe-area-inset-top));right:18px;z-index:9;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.20);background:rgba(0,0,0,.45);color:white;font-size:28px;font-weight:700;line-height:1;cursor:pointer}.loader{position:absolute;inset:0;background:#03020a;z-index:30;display:none;place-items:center;text-align:center}.loader.active{display:grid}.loader div{animation:pulse 1.2s infinite alternate}.loader .spark{font-size:38px;margin-bottom:14px}.loader p{color:#d9d1df;margin:0}@keyframes pulse{from{opacity:.55;transform:scale(.98)}to{opacity:1;transform:scale(1)}}@media (orientation:landscape){.art{width:auto;height:100dvh}.start h1{font-size:52px}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <section class="start screen active" id="startScreen">
      <div class="brand">CONVITE PREMIUM</div>
      <h1>Mafer XV</h1>
      <p>Toque para abrir o convite</p>
      <button id="startBtn">Abrir convite</button>
    </section>

    <section class="screen" id="videoScreen">
      <video class="video" id="introVideo" src="assets/abertura.mp4" playsinline preload="auto"></video>
    </section>

    <section class="screen" id="mainScreen">
      <div class="imageStage" id="mainStage">
        <img class="art" src="assets/principal.png" alt="Convite Mafer XV">
        <button class="hotspot" data-action="whatsapp" title="Confirmar presença" style="left:28%;top:61%;width:16%;height:10%;"></button>
        <button class="hotspot" data-action="maps" title="Localização" style="left:43%;top:61%;width:15%;height:10%;"></button>
        <button class="hotspot" data-action="presentes" title="Sugestões de presentes" style="left:58%;top:61%;width:19%;height:10%;"></button>
        <div class="hint">Toque nos botões do convite</div>
      </div>
    </section>

    <section class="panel" id="presentesScreen">
      <button class="close" id="closePresentes" aria-label="Voltar">×</button>
      <div class="imageStage">
        <img class="art" src="assets/presentes.png" alt="Sugestões de presentes">
      </div>
    </section>

    <div class="fade" id="fade"></div>
    <div class="loader" id="loader"><div><div class="spark">✨</div><p>Preparando seu convite...</p></div></div>
    <audio id="music" src="assets/musica.mp3" loop preload="auto"></audio>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    if (qs.get('debug') === '1') document.body.classList.add('debug');

    const startScreen = document.getElementById('startScreen');
    const videoScreen = document.getElementById('videoScreen');
    const mainScreen = document.getElementById('mainScreen');
    const presentesScreen = document.getElementById('presentesScreen');
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('introVideo');
    const music = document.getElementById('music');
    const fade = document.getElementById('fade');
    const loader = document.getElementById('loader');

    const WHATSAPP_LINK = 'https://wa.me/5588994103188?text=Ol%C3%A1%2C%20confirmo%20minha%20presen%C3%A7a%20no%20Mafer%20XV.';
    const MAPS_LINK = 'https://www.google.com/maps/search/?api=1&query=local%20do%20evento%20Mafer%20XV';

    function show(el){
      [startScreen, videoScreen, mainScreen].forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }
    function fadeOn(){ fade.classList.add('on'); }
    function fadeOff(){ fade.classList.remove('on'); }
    async function tryFullscreen(){
      try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e) {}
    }
    function transitionToMain(){
      fadeOn();
      setTimeout(() => { show(mainScreen); fadeOff(); }, 750);
    }

    startBtn.addEventListener('click', async () => {
      await tryFullscreen();
      loader.classList.add('active');
      try { music.volume = 0.75; await music.play(); } catch(e) {}
      setTimeout(async () => {
        loader.classList.remove('active');
        show(videoScreen);
        try { video.currentTime = 0; await video.play(); } catch(e) { transitionToMain(); }
      }, 900);
    });

    video.addEventListener('ended', transitionToMain);
    video.addEventListener('error', transitionToMain);

    document.querySelectorAll('.hotspot').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        if (action === 'presentes') presentesScreen.classList.add('active');
        if (action === 'whatsapp') window.open(WHATSAPP_LINK, '_blank');
        if (action === 'maps') window.open(MAPS_LINK, '_blank');
      });
    });
    document.getElementById('closePresentes').addEventListener('click', () => presentesScreen.classList.remove('active'));
  </script>
</body>
</html>
