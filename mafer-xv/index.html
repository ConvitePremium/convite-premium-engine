<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mafer XV</title>
  <meta name="theme-color" content="#03020a" />
  <meta property="og:title" content="Mafer XV" />
  <meta property="og:description" content="Toque para abrir o convite." />
  <meta property="og:image" content="https://convitepremium.github.io/convite-premium-engine/mafer-xv/assets/principal.png" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03020a;color:#fff;font-family:Arial,Helvetica,sans-serif}.app{position:fixed;inset:0;background:#03020a;overflow:hidden}.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#03020a}.screen.active{display:flex}.start{z-index:20;display:flex;flex-direction:column;gap:18px;text-align:center;padding:28px;background:radial-gradient(circle at 50% 35%,rgba(44,31,70,.95),#03020a 72%)}.brand{letter-spacing:7px;color:#f3c969;font-size:12px;font-weight:700}.start h1{font-size:clamp(46px,14vw,92px);margin:0;line-height:.95}.start p{margin:0;color:#d7d1df;font-size:18px}.gold-btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fff0a9,#d49c2d 55%,#8e5d12);color:#120a02;font-weight:900;font-size:18px;padding:17px 30px;box-shadow:0 18px 50px rgba(245,190,70,.28);cursor:pointer}.video{max-width:100vw;max-height:100dvh;width:auto;height:auto;object-fit:contain;background:#000}.mediaBox{position:relative;height:100dvh;max-height:100dvh;width:min(100vw,calc(100dvh * 9 / 16));aspect-ratio:9/16;display:block;background:#03020a;overflow:hidden}.art{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}.hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;z-index:3}.debug .hotspot{background:rgba(255,0,0,.32)!important;border:2px solid rgba(255,255,255,.9)}.hint{position:absolute;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(8px);border-radius:999px;padding:8px 13px;color:#ddd;font-size:12px;opacity:.75;z-index:4}.panel{position:absolute;inset:0;background:#03020a;display:none;align-items:center;justify-content:center;z-index:8}.panel.active{display:flex}.close{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;z-index:12;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.55);color:white;font-size:30px;font-weight:800;line-height:1;cursor:pointer}.fade{position:absolute;inset:0;background:#03020a;opacity:0;pointer-events:none;transition:opacity .65s ease;z-index:15}.fade.on{opacity:1}.loader{position:absolute;inset:0;background:#03020a;z-index:30;display:none;place-items:center;text-align:center}.loader.active{display:grid}.spark{font-size:42px;margin-bottom:14px;animation:pulse 1.1s infinite alternate}.loader p{color:#d9d1df;margin:0;font-size:17px}@keyframes pulse{from{opacity:.55;transform:scale(.96)}to{opacity:1;transform:scale(1.03)}}@media (orientation:landscape){.mediaBox{height:100dvh;width:calc(100dvh * 9 / 16)}.start h1{font-size:58px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="start screen active" id="startScreen">
      <div class="brand">CONVITE PREMIUM</div>
      <h1>Mafer XV</h1>
      <p>Toque para iniciar a experiência</p>
      <button class="gold-btn" id="startBtn">Iniciar convite</button>
    </section>

    <section class="screen" id="videoScreen">
      <video class="video" id="introVideo" src="assets/abertura.mp4" playsinline preload="auto"></video>
    </section>

    <section class="screen" id="mainScreen">
      <div class="mediaBox">
        <img class="art" src="assets/principal.png" alt="Convite Mafer XV">
        <button class="hotspot" data-action="whatsapp" title="Confirmar presença" style="left:27%;top:61%;width:18%;height:13%;"></button>
        <button class="hotspot" data-action="maps" title="Localização" style="left:43%;top:61%;width:16%;height:13%;"></button>
        <button class="hotspot" data-action="presentes" title="Sugestões de presentes" style="left:58%;top:61%;width:22%;height:13%;"></button>
        <div class="hint">Toque nos botões do convite</div>
      </div>
    </section>

    <section class="panel" id="presentesScreen">
      <button class="close" id="closePresentes" aria-label="Voltar">×</button>
      <div class="mediaBox"><img class="art" src="assets/presentes.png" alt="Sugestões de presentes"></div>
    </section>

    <div class="fade" id="fade"></div>
    <div class="loader" id="loader"><div><div class="spark">✨</div><p>Preparando seu convite...</p></div></div>
    <audio id="music" src="assets/musica.mp3" loop preload="auto"></audio>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    if (qs.get('debug') === '1') document.body.classList.add('debug');

    const startScreen = document.getElementById('startScreen');
    const videoScreen = document.getElementById('videoScreen');
    const mainScreen = document.getElementById('mainScreen');
    const presentesScreen = document.getElementById('presentesScreen');
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('introVideo');
    const music = document.getElementById('music');
    const fade = document.getElementById('fade');
    const loader = document.getElementById('loader');

    const WHATSAPP_LINK = 'https://wa.me/5588994103188?text=Ol%C3%A1%2C%20confirmo%20minha%20presen%C3%A7a%20no%20Mafer%20XV.';
    const MAPS_LINK = 'https://www.google.com/maps/search/?api=1&query=Mafer%20XV';

    function show(screen){
      [startScreen, videoScreen, mainScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }
    function fadeTo(screen){
      fade.classList.add('on');
      setTimeout(() => { show(screen); presentesScreen.classList.remove('active'); fade.classList.remove('on'); }, 650);
    }
    async function tryFullscreen(){
      try { if (!document.fullscreenElement && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e) {}
    }
    function goMain(){ fadeTo(mainScreen); }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      await tryFullscreen();
      loader.classList.add('active');
      try { music.volume = 0.72; await music.play(); } catch(e) {}
      setTimeout(async () => {
        loader.classList.remove('active');
        show(videoScreen);
        try { video.currentTime = 0; await video.play(); } catch(e) { goMain(); }
      }, 700);
    });

    video.addEventListener('ended', goMain);
    video.addEventListener('error', goMain);
    video.addEventListener('click', () => { if (!video.paused) video.pause(); else video.play(); });

    document.querySelectorAll('.hotspot').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'presentes') presentesScreen.classList.add('active');
        if (action === 'whatsapp') window.open(WHATSAPP_LINK, '_blank');
        if (action === 'maps') window.open(MAPS_LINK, '_blank');
      });
    });
    document.getElementById('closePresentes').addEventListener('click', () => presentesScreen.classList.remove('active'));
  </script>
</body>
</html>
